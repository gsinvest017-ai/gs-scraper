<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>{% block title %}QUANTDATA Search{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
<header>
  <a href="/" class="logo">📊 QUANTDATA Search</a>
  <span class="catalog-tag">catalog: <code>{{ catalog_path or 'catalog/quant.duckdb' }}</code></span>
  <span class="links">
    <a href="/">Views</a>
    <a href="/gap_dashboard.html" target="_blank">Gap dashboard ↗</a>
  </span>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  <small>QUANTDATA Search UI · Flask + Plotly · 127.0.0.1:5050 · read-only catalog snapshot</small>
</footer>
<script src="{{ url_for('static', filename='main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
