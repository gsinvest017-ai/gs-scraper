name: pytest

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ui/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pytest.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'ui/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pytest.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ingest,dev]"

      - name: Lint check (non-blocking)
        run: ruff check src/ ui/ tests/ || true

      - name: Run pytest
        run: pytest -q tests/

  # Windows matrix run on demand (manual trigger). The ingest pipeline is
  # Linux-only (cron + /tmp lock), but unit-level pytest must stay green on
  # Windows too — this guards against accidental Linux-isms in pure-logic code.
  test-windows:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ingest,dev]"
      - name: Run pytest
        run: pytest -q tests/
